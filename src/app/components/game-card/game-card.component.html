<article class="game-card" (click)="playGame()" (keyup.enter)="playGame()" tabindex="0" role="button">
  <div class="game-card__icon" aria-hidden="true">{{ game().icon }}</div>

  <div class="game-card__content">
    <h3>{{ game().title }}</h3>
    <p>{{ game().description }}</p>
    <span class="difficulty">{{ game().difficulty }}</span>
  </div>

  <button type="button" class="play-button" (click)="playGame(); $event.stopPropagation()">PLAY</button>
</article>
