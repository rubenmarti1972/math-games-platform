<section class="games-page container">
  <header class="games-page__header">
    <h1>Catálogo de juegos</h1>
    <p>Descubre experiencias jugables que combinan estrategia, curiosidad y pensamiento matemático.</p>
  </header>

  <div class="games-grid">
    @for (game of games; track game.id) {
      <app-game-card [game]="game"></app-game-card>
    }
  </div>
</section>
