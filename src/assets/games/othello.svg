<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Fondo tablero -->
  <rect width="320" height="200" fill="#1A1225"/>

  <!-- Grid 8x8 centrado -->
  <g transform="translate(60, 12)">
    <!-- Fondo tablero verde oscuro -->
    <rect x="0" y="0" width="200" height="176" rx="6" fill="#1e3a2f"/>
    <rect x="2" y="2" width="196" height="172" rx="5" fill="#1e4035" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>

    <!-- Líneas de la cuadrícula -->
    <g stroke="rgba(255,255,255,0.12)" stroke-width="0.5">
      <line x1="25" y1="2" x2="25" y2="174"/>
      <line x1="50" y1="2" x2="50" y2="174"/>
      <line x1="75" y1="2" x2="75" y2="174"/>
      <line x1="100" y1="2" x2="100" y2="174"/>
      <line x1="125" y1="2" x2="125" y2="174"/>
      <line x1="150" y1="2" x2="150" y2="174"/>
      <line x1="175" y1="2" x2="175" y2="174"/>
      <line x1="2" y1="22" x2="198" y2="22"/>
      <line x1="2" y1="44" x2="198" y2="44"/>
      <line x1="2" y1="66" x2="198" y2="66"/>
      <line x1="2" y1="88" x2="198" y2="88"/>
      <line x1="2" y1="110" x2="198" y2="110"/>
      <line x1="2" y1="132" x2="198" y2="132"/>
      <line x1="2" y1="154" x2="198" y2="154"/>
    </g>

    <!-- Fichas rojas (jugador 1) -->
    <circle cx="88" cy="77" r="9" fill="url(#red)" filter="url(#shadow)"/>
    <circle cx="113" cy="55" r="9" fill="url(#red)" filter="url(#shadow)"/>
    <circle cx="63" cy="55" r="9" fill="url(#red)" filter="url(#shadow)"/>
    <circle cx="63" cy="77" r="9" fill="url(#red)" filter="url(#shadow)"/>
    <circle cx="88" cy="99" r="9" fill="url(#red)" filter="url(#shadow)"/>
    <circle cx="38" cy="77" r="9" fill="url(#red)" filter="url(#shadow)"/>

    <!-- Fichas verdes (jugador 2) -->
    <circle cx="113" cy="77" r="9" fill="url(#green)" filter="url(#shadow)"/>
    <circle cx="88" cy="55" r="9" fill="url(#green)" filter="url(#shadow)"/>
    <circle cx="113" cy="99" r="9" fill="url(#green)" filter="url(#shadow)"/>
    <circle cx="138" cy="77" r="9" fill="url(#green)" filter="url(#shadow)"/>
    <circle cx="138" cy="55" r="9" fill="url(#green)" filter="url(#shadow)"/>
    <circle cx="138" cy="99" r="9" fill="url(#green)" filter="url(#shadow)"/>
    <circle cx="163" cy="77" r="9" fill="url(#green)" filter="url(#shadow)"/>

    <!-- Celdas highlight -->
    <rect x="3" y="111" width="21" height="21" rx="3" fill="rgba(109,40,217,0.25)" stroke="rgba(139,92,246,0.6)" stroke-width="1" stroke-dasharray="3,2"/>
    <rect x="53" y="111" width="21" height="21" rx="3" fill="rgba(109,40,217,0.25)" stroke="rgba(139,92,246,0.6)" stroke-width="1" stroke-dasharray="3,2"/>
  </g>

  <!-- Score panel derecho -->
  <g transform="translate(270, 20)">
    <rect x="0" y="0" width="42" height="70" rx="8" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>
    <circle cx="21" cy="20" r="8" fill="url(#red2)"/>
    <text x="21" y="42" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif">6</text>
    <circle cx="21" cy="56" r="8" fill="url(#green2)"/>
    <text x="21" y="77" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif">7</text>
  </g>

  <!-- Label -->
  <text x="16" y="194" fill="rgba(255,255,255,0.35)" font-size="9" font-family="Inter,sans-serif" font-weight="600" letter-spacing="1">OTHELLO · ESTRATEGIA</text>

  <!-- Gradients y filtros -->
  <defs>
    <radialGradient id="red" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </radialGradient>
    <radialGradient id="green" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <radialGradient id="red2" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#fca5a5"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </radialGradient>
    <radialGradient id="green2" cx="35%" cy="30%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>
</svg>
