<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Fondo -->
  <rect width="320" height="200" fill="#064E3B"/>

  <!-- Título zona -->
  <text x="160" y="22" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="2">PANDA 4×4 · LÓGICA</text>

  <!-- Cuadrícula principal 4x4 centrada -->
  <g transform="translate(60, 30)">
    <!-- Sombra fondo -->
    <rect x="2" y="2" width="200" height="158" rx="12" fill="rgba(0,0,0,0.3)"/>
    <!-- Fondo -->
    <rect x="0" y="0" width="200" height="158" rx="12" fill="#065f46" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Celda (0,0) - verde oscuro ocupado -->
    <rect x="8" y="8" width="42" height="33" rx="6" fill="#16a34a"/>
    <text x="29" y="29" text-anchor="middle" fill="white" font-size="16">🐼</text>

    <!-- Celda (0,1) - vacía highlight -->
    <rect x="54" y="8" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>

    <!-- Celda (0,2) - verde -->
    <rect x="100" y="8" width="42" height="33" rx="6" fill="#15803d"/>
    <text x="121" y="29" text-anchor="middle" fill="white" font-size="16">🐼</text>

    <!-- Celda (0,3) - vacía highlight -->
    <rect x="146" y="8" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(52,211,153,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/>

    <!-- Fila 1 -->
    <rect x="8" y="45" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)"/>
    <rect x="54" y="45" width="42" height="33" rx="6" fill="#16a34a"/>
    <text x="75" y="66" text-anchor="middle" fill="white" font-size="16">🐼</text>
    <rect x="100" y="45" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(52,211,153,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="146" y="45" width="42" height="33" rx="6" fill="#15803d"/>
    <text x="167" y="66" text-anchor="middle" fill="white" font-size="16">🐼</text>

    <!-- Fila 2 -->
    <rect x="8" y="82" width="42" height="33" rx="6" fill="#15803d"/>
    <text x="29" y="103" text-anchor="middle" fill="white" font-size="16">🐼</text>
    <rect x="54" y="82" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)"/>
    <rect x="100" y="82" width="42" height="33" rx="6" fill="#16a34a"/>
    <text x="121" y="103" text-anchor="middle" fill="white" font-size="16">🐼</text>
    <rect x="146" y="82" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Fila 3 -->
    <rect x="8" y="119" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)" stroke="rgba(52,211,153,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <rect x="54" y="119" width="42" height="33" rx="6" fill="#15803d"/>
    <text x="75" y="140" text-anchor="middle" fill="white" font-size="16">🐼</text>
    <rect x="100" y="119" width="42" height="33" rx="6" fill="rgba(255,255,255,0.07)"/>
    <rect x="146" y="119" width="42" height="33" rx="6" fill="#16a34a"/>
    <text x="167" y="140" text-anchor="middle" fill="white" font-size="16">🐼</text>
  </g>

  <!-- Indicador de progreso -->
  <g transform="translate(60, 195)">
    <rect x="0" y="-8" width="200" height="5" rx="3" fill="rgba(255,255,255,0.15)"/>
    <rect x="0" y="-8" width="130" height="5" rx="3" fill="#34d399"/>
  </g>
</svg>
