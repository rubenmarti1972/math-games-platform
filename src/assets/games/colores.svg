<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Fondo -->
  <rect width="320" height="200" fill="#1c0a00"/>

  <text x="160" y="18" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-size="9" font-family="Inter,sans-serif" font-weight="700" letter-spacing="2">LAB DE COLORES · FRACCIONES</text>

  <!-- Matraces / tubos de color -->
  <!-- Matraz rojo -->
  <g transform="translate(38, 28)">
    <rect x="10" y="0" width="30" height="8" rx="3" fill="rgba(255,255,255,0.15)"/>
    <path d="M5,8 L0,90 Q0,100 10,100 L40,100 Q50,100 50,90 L45,8 Z" fill="rgba(239,68,68,0.15)" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
    <path d="M5,55 L2,90 Q2,97 10,97 L40,97 Q48,97 48,90 L45,55 Z" fill="url(#redFill)"/>
    <text x="25" y="80" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif">½</text>
    <!-- burbuja -->
    <circle cx="15" cy="65" r="4" fill="rgba(255,255,255,0.25)"/>
    <circle cx="30" cy="72" r="3" fill="rgba(255,255,255,0.2)"/>
  </g>

  <!-- Matraz amarillo -->
  <g transform="translate(108, 18)">
    <rect x="10" y="0" width="30" height="8" rx="3" fill="rgba(255,255,255,0.15)"/>
    <path d="M5,8 L0,100 Q0,110 10,110 L40,110 Q50,110 50,100 L45,8 Z" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.4)" stroke-width="1.5"/>
    <path d="M5,45 L1,100 Q1,107 10,107 L40,107 Q49,107 49,100 L44,45 Z" fill="url(#yellowFill)"/>
    <text x="25" y="88" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif">¾</text>
    <circle cx="18" cy="60" r="3" fill="rgba(255,255,255,0.25)"/>
    <circle cx="35" cy="75" r="4" fill="rgba(255,255,255,0.18)"/>
  </g>

  <!-- Matraz azul -->
  <g transform="translate(178, 30)">
    <rect x="10" y="0" width="30" height="8" rx="3" fill="rgba(255,255,255,0.15)"/>
    <path d="M5,8 L0,88 Q0,98 10,98 L40,98 Q50,98 50,88 L45,8 Z" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.4)" stroke-width="1.5"/>
    <path d="M5,62 L2,88 Q2,95 10,95 L40,95 Q48,95 48,88 L45,62 Z" fill="url(#blueFill)"/>
    <text x="25" y="82" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter,sans-serif">¼</text>
    <circle cx="20" cy="70" r="3" fill="rgba(255,255,255,0.22)"/>
  </g>

  <!-- Resultado -->
  <g transform="translate(246, 36)">
    <rect x="0" y="0" width="60" height="90" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- mezcla naranja resultado -->
    <rect x="3" y="40" width="54" height="47" rx="7" fill="url(#orangeFill)"/>
    <text x="30" y="25" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-family="Inter,sans-serif">Objetivo</text>
    <circle cx="30" cy="66" r="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <text x="30" y="70" text-anchor="middle" fill="white" font-size="10" font-weight="800" font-family="Inter,sans-serif">🎯</text>
  </g>

  <!-- Flecha mezcla -->
  <text x="240" y="82" fill="rgba(255,255,255,0.4)" font-size="18">→</text>

  <!-- Ecuación abajo -->
  <rect x="38" y="148" width="244" height="36" rx="8" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  <text x="160" y="162" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-family="Inter,sans-serif">
    <tspan fill="#f87171">½</tspan>
    <tspan fill="rgba(255,255,255,0.4)"> R + </tspan>
    <tspan fill="#fbbf24">¾</tspan>
    <tspan fill="rgba(255,255,255,0.4)"> A + </tspan>
    <tspan fill="#60a5fa">¼</tspan>
    <tspan fill="rgba(255,255,255,0.4)"> Az = </tspan>
    <tspan fill="#fb923c" font-weight="700">Naranja</tspan>
  </text>
  <text x="160" y="178" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="Inter,sans-serif">Simplifica y encuentra la mezcla correcta</text>

  <defs>
    <linearGradient id="redFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="yellowFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="orangeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
  </defs>
</svg>
